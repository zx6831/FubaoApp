services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fubao
      POSTGRES_USER: fubao
      POSTGRES_PASSWORD: fubao_dev_only
    ports:
      - "5432:5432"
    volumes:
      - fubao_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fubao -d fubao"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - fubao_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./services/api
    environment:
      PORT: 3000
      NODE_ENV: development
      PERSISTENCE_DRIVER: postgres
      DATABASE_URL: postgresql://fubao:fubao_dev_only@postgres:5432/fubao?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: local-dev-access-secret-change-before-production
      HASH_PEPPER: local-dev-hash-pepper-change-before-production
      DATA_ENCRYPTION_KEY: local-dev-data-key-change-before-production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  fubao_postgres_data:
  fubao_redis_data:
